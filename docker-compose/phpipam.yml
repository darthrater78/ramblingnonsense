services:
  phpipam-web:
    image: phpipam/phpipam-www:v1.7.4
    ports:
      - "80:80"
    environment:
      - TZ=America/New_York
      - IPAM_DATABASE_HOST=phpipam-mariadb
      - IPAM_DATABASE_PASS=CHANGEME
      - IPAM_DATABASE_WEBHOST=%
      # After initial setup, add IPAM_DISABLE_INSTALLER=1 to prevent re-initialization via the web installer
    restart: always
    volumes:
      - /opt/docker/phpipam/phpipam-logo:/phpipam/css/images/logo  # custom logo override
      - /opt/docker/phpipam/phpipam-ca:/usr/local/share/ca-certificates:ro  # only needed for internal/private CA certs
    depends_on:
      - phpipam-mariadb
    networks:
      - phpipam-network

  phpipam-cron:
    image: phpipam/phpipam-cron:v1.7.4
    environment:
      - TZ=America/New_York
      - IPAM_DATABASE_HOST=phpipam-mariadb
      - IPAM_DATABASE_PASS=CHANGEME
      - SCAN_INTERVAL=1h
    restart: unless-stopped
    volumes:
      - /opt/docker/phpipam/phpipam-ca:/usr/local/share/ca-certificates:ro
    depends_on:
      - phpipam-mariadb
    networks:
      - phpipam-network

  phpipam-mariadb:
    image: mariadb:latest
    environment:
      - MYSQL_ROOT_PASSWORD=CHANGEME
    restart: always
    volumes:
      - /opt/docker/phpipam/phpipam-db-data:/var/lib/mysql  # persistent DB storage — must exist on host before first start
    networks:
      - phpipam-network

# If 172.25.0.0/24 conflicts with existing Docker or LAN networks, change to any unused /24
# in the 172.16.0.0/12 range. Check existing networks with: docker network ls && docker network inspect <name>
networks:
  phpipam-network:
    ipam:
      config:
        - subnet: 172.25.0.0/24
