networks:
  zigbee_network:
    driver: bridge

services:
  zigbee2mqtt:
    container_name: zigbee2mqtt
    image: ghcr.io/koenkk/zigbee2mqtt:latest
    restart: unless-stopped
    volumes:
      - /opt/docker/zigbee2mqtt/data:/app/data
      - /run/udev:/run/udev:ro
    ports:
      - "8485:8485"
      - "8080:8080"
    environment:
      - TZ=America/New_York
    networks:
      - zigbee_network
