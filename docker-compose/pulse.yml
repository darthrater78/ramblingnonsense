services:
  pulse:
    image: rcourtman/pulse:latest
    container_name: pulse
    restart: unless-stopped
    ports:
      - "7655:7655"
    volumes:
      - /opt/docker/pulse:/data

# Inside your volume directory, create a .env file with these attributes.
# PULSE_AUTH_USER and PULSE_AUTH_PASS become your login credentials.
# API_TOKEN is a seed value — you will replace it in the GUI after first login.
#
# PULSE_AUTH_USER=
# PULSE_AUTH_PASS=
# API_TOKEN=YOUR_API_TOKEN_SEED

---

# Pulse Docker Agent — deploy on each remote host you want Pulse to monitor

services:
  pulse-docker-agent:
    image: ghcr.io/rcourtman/pulse-docker-agent:latest
    container_name: pulse-docker-agent
    environment:
      - PULSE_URL=
      - PULSE_TOKEN=
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
